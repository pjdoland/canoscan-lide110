name: CanoScanLiDE110
options:
  bundleIdPrefix: com.canoscan
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  ScannerKit:
    path: ScannerKit

targets:
  CanoScanLiDE110:
    type: application
    platform: macOS
    sources:
      - CanoScanLiDE110
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.canoscan.lide110
        PRODUCT_NAME: CanoScan LiDE 110
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_CFBundleDisplayName: "CanoScan LiDE 110"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_ENTITLEMENTS: ""
        ENABLE_APP_SANDBOX: "NO"
        ENABLE_HARDENED_RUNTIME: "NO"
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - package: ScannerKit
